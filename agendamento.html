<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Victor Style | Agendamento</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header class="cabecalho">
        <div class="logo">
            <h1>💈 Victor Style</h1>
        </div>
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="servicos.html">Serviços</a>
            <a href="galeria.html">Galeria</a>
            <a href="agendamento.html" class="ativo">Agendamento</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <main>
        <section class="secao-formulario">
            <div class="container-form">
                <h2>Reserve seu Horário</h2>
                <p>Preencha os dados abaixo e escolha o melhor momento para dar um trato no visual.</p>

                <form action="#" method="POST" class="formulario">
                    
                    <div class="campo">
                        <abel for="nome">Nome Completo:</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                    </div>

                    <div class="campo">
                        <label for="telefone">Telefone / WhatsApp:</label>
                        <input type="tel" id="telefone" name="telefone" placeholder="(89) 99999-9999" required>
                    </div>

                    <div class="campo">
                        <label for="servico">Escolha o Serviço:</label>
                        <select id="servico" name="servico" required>
                            <option value="">-- Selecione um serviço --</option>
                            <option value="cabelo">Corte</option>
                            <option value="barba">Barba</option>
                            <option value="combo">Combo: Cabelo + Barba e/ou Sobrancelha</option>
                            <option value="sobrancelha">Sobrancelha</option>
                            <option value="Especial">Corte Especial ex:Nevou, Luzes entre outros.</option>
                        </select>
                    </div>

                    <div class="campo-duplo">
                        <div class="campo">
                            <label for="data">Data:</label>
                            <input type="date" id="data" name="data" required>
                        </div>
                        <div class="campo">
                            <label for="hora">Horário:</label>
                            <input type="time" id="hora" name="hora" min="08:00" max="19:00" required>
                        </div>
                    </div>

                    <div class="campo">
                        <label for="observacoes">Observações (Opcional):</label>
                        <textarea id="observacoes" name="observacoes" rows="4" placeholder="Alguma preferência ou aviso para o barbeiro?"></textarea>
                    </div>

                    <button type="submit" class="botao-enviar">Confirmar Agendamento</button>

                </form>
            </div>
        </section>
    </main>

    <footer class="rodape">
        <p>&copy; 2026 Victor Style. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
